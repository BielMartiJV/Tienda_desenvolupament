services:

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}

  backend:
    build:
      context: ../backend
      dockerfile: dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    env_file:
      - ../.env
    depends_on:
      - mongo

  frontend:
    build:
      context: ../frontend
      dockerfile: dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    env_file:
      - ../.env
    depends_on:
      - backend