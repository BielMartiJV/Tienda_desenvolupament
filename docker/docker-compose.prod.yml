services:

  mongo:
    image: mongo
    container_name: ecommerce-mongo-prod
    restart: always

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ../backend
      dockerfile: dockerfile

    container_name: ecommerce-backend-prod

    restart: always

    ports:
      - "3000:3000"

    env_file:
      - ../.env

    depends_on:
      - mongo

  frontend:
    build:
      context: ../frontend
      dockerfile: dockerfile

    container_name: ecommerce-frontend-prod

    restart: always

    ports:
      - "80:80"

    env_file:
      - ../.env

    depends_on:
      - backend

volumes:
  mongo-data: